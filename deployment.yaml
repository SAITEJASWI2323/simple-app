---
apiVersion: v1
kind: Service
metadata:
  name: java-service
spec:
  type: NodePort
  selector:
    app: java-app
  ports:
    - port: 8086       # Access inside the cluster at java-service:8086
      targetPort: 8080 # The port the app is (supposed to be) listening on
      nodePort: 30002  # External access via <Node-IP>:30002
